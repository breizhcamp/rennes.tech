spring:
  application.name: rennes.tech

  jpa.open-in-view: false
  liquibase.changeLog: classpath:/db/changelog/db.changelog-master.xml
  datasource:
    url: jdbc:postgresql://${POSTGRESQL_HOST}:${POSTGRESQL_PORT}/${POSTGRESQL_DB}?currentSchema=${POSTGRESQL_SCHEMA}
    username: ${POSTGRESQL_USER}
    password: ${POSTGRESQL_PASSWORD}


management.server.port: 8081

server:
  forward-headers-strategy: FRAMEWORK
  tomcat.remoteip:
    remote_ip_header: X-Forwarded-For
    protocol_header: X-Forwarded-Proto

springdoc.packages-to-scan: org.breizhcamp.rennes.tech.application.rest

rennes.tech.back:
  sync.enabled: true
  meetup:
    base-url: https://www.meetup.com
    query-hash: ${MEETUP_QUERY_HASH:a826136d4ea53dbf6b9b57b62b09b4c0a285c909f713b3bf348f8118af45c600}
