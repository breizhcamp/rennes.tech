<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:markdown="http://www.w3.org/1999/xhtml">
<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

  <title>Rennes Tech</title>

  <style>
	  .card-text {
		  height: 180px;
		  overflow: hidden;
		  text-overflow: ellipsis;
	  }

	  .card-subtitle {
		  color: #888;
		  margin: 10px 0 10px 10px;
	  }

	  .meetup-icon {
		  float: right;
		  margin-right: 10px
	  }

	  .icon {
		  min-width: 100px;
		  display: inline-block;
		  margin-right: 10px;
	  }

    .talk-link {
        padding: 0 0 10px 10px;
    }

	  #events li {
		  list-style: none;
	  }
  </style>
</head>
<body>
<main role="main">
  <section class="jumbotron text-center" style="margin-bottom: 0">
    <div class="container">
      <img src="logo.png" style="position:absolute; right:10px; top:-5px">
      <h1 class="jumbotron-heading">Les meetups Techniques de Rennes</h1>
    </div>
    <div height="100" id="icons">
      <div th:each="group : ${groups}" class="icon">
        <a th:href="${group.url}" target="_blank">
          <img th:src="@{'/meetups/' + ${group.id} + '.png'}" th:title="${group.name}" th:alt="${group.name}"/>
        </a>
      </div>
    </div>
  </section>

  <div class="album py-5 bg-light">
    <div class="container">
      <div class="row">
        <div class="col-md text-center">
          <h2>Évènements à venir&nbsp;:</h2>
        </div>
      </div>

      <ol class="row" id="events">
        <li th:each="ev : ${nextEvents}" class='col-md-4'>
          <div class='card mb-4 box-shadow'>
            <img class='card-img-top' th:src="${ev.thumbnailUrl ?: 'placeholder.png'}"
                 style='height: 180px; width: 100%; display: block;'>
            <div class='card-body'>
              <h5 class='card-title' th:text="${ev.title}">Nom de l'évènement</h5>
              <h6 class='card-subtitle mb-2' th:text="${#temporals.format(ev.startDate, 'dd/MM/yyyy HH:mm')}">Date de
                l'évènement</h6>
              <div class="card-text">
                <img th:src="@{'/meetups/' + ${ev.group.id} + '.png'}" class='meetup-icon'/>
                <span markdown:toHtml="${ev.description}">Description de l'évènement</span>
              </div>
            </div>
            <div class="d-flex justify-content-between align-items-center talk-link">
              <a th:href="${ev.url}" target="_blank" class="btn btn-sm btn-outline-secondary">En savoir plus ...</a>
            </div>
          </div>
        </li>
      </ol>

    </div>
  </div>

</main>

<footer>
  <section class="jumbotron card">
    <div class="row">
      <p class="col-md text-center">
        Rennes.tech est une initiative des communautés techniques rennaises.
      </p>
    </div>
    <div class="row">
      <p class="col-md text-center">
        Vous voulez ajouter votre meetup à cette liste ? Ça se passe <a
        href="https://github.com/breizhcamp/rennes.tech/issues">ici</a> !
      </p>
    </div>
  </section>
</footer>


<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.min.js"
        integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
<script defer src="https://use.fontawesome.com/releases/v5.0.10/js/all.js"
        integrity="sha384-slN8GvtUJGnv6ca26v8EzVaR9DC58QEwsIk9q1QXdCU8Yu8ck/tL/5szYlBbqmS+"
        crossorigin="anonymous"></script>

</body>
</html>
